<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple Landing</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    function Header({ currentPage, setCurrentPage }) {
      return (
        <header className="site-header">
          <div className="container">
            <h1 className="brand">Codify</h1>
            <nav>
              <button className={`nav-link ${currentPage === 'home' ? 'active' : ''}`} onClick={() => setCurrentPage('home')}>Home</button>
              <button className={`nav-link ${currentPage === 'about' ? 'active' : ''}`} onClick={() => setCurrentPage('about')}>About</button>
              <button className={`nav-link ${currentPage === 'contact' ? 'active' : ''}`} onClick={() => setCurrentPage('contact')}>Contact</button>
              <a href="#">Docs</a>
            </nav>
          </div>
        </header>
      );
    }

    function Hero() {
      return (
        <section className="hero">
          <div className="container">
            <h2>Build faster with clean components</h2>
            <p>A minimal, responsive React landing page example.</p>
            <div className="cta">
              <button className="btn primary">Get Started</button>
              <button className="btn">Learn More</button>
            </div>
          </div>
        </section>
      );
    }

    function FeatureCard({title, children}) {
      return (
        <article className="card">
          <h3>{title}</h3>
          <p>{children}</p>
        </article>
      );
    }

    function Features() {
      return (
        <section id="features" className="features container">
          <FeatureCard title="Fast Setup">Create pages quickly with reusable components.</FeatureCard>
          <FeatureCard title="Responsive">Mobile-first styles and flexible layout.</FeatureCard>
          <FeatureCard title="Accessible">Semantic HTML and sensible defaults.</FeatureCard>
        </section>
      );
    }

    function About() {
      return (
        <section className="about-page">
          <div className="container">
            <h2>About Codify</h2>
            <p>Codify is a simple, clean landing page template built with React. It demonstrates best practices for responsive design, reusable components, and minimal dependencies.</p>
            <h3>Our Mission</h3>
            <p>To provide developers with a lightweight, accessible starting point for building modern web applications.</p>
            <h3>Built With</h3>
            <ul>
              <li>React 18 (via CDN)</li>
              <li>Plain CSS with mobile-first approach</li>
              <li>No build tools required</li>
              <li>Semantic HTML</li>
            </ul>
          </div>
        </section>
      );
    }

    function Contact() {
      return (
        <section className="about-page">
          <div className="container">
            <h2>Contact Codify</h2>
            <p>Have a question or want to collaborate? Reach out to our team and we&apos;ll get back to you quickly.</p>
            <div className="card" style="max-width:520px;">
              <h3>Get in Touch</h3>
              <p>Email: <a href="mailto:hello@codify.dev">hello@codify.dev</a></p>
              <p>Phone: +1 (555) 010-2048</p>
              <p>Location: Remote-first team with a focus on fast, accessible web experiences.</p>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="site-footer">
          <div className="container footer-grid">
            <div>
              <h3 className="brand footer-brand">Codify</h3>
              <p>Thoughtful starting points for modern product teams.</p>
            </div>
            <div>
              <h4>Explore</h4>
              <ul className="footer-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Docs</a></li>
              </ul>
            </div>
            <div>
              <h4>Contact</h4>
              <ul className="footer-links">
                <li><a href="mailto:hello@codify.dev">hello@codify.dev</a></li>
                <li><a href="#">+1 (555) 010-2048</a></li>
              </ul>
            </div>
            <div>
              <h4>Follow</h4>
              <div className="social">
                <a href="#">X</a>
                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>
              </div>
            </div>
          </div>
          <div className="container footer-bottom">
            <p>© {new Date().getFullYear()} Codify. Built for speed and clarity.</p>
            <a href="#" className="back-to-top">Back to top ↑</a>
          </div>
        </footer>
      );
    }

    function App() {
      const [currentPage, setCurrentPage] = useState('home');

      return (
        <div>
          <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
          <main>
            {currentPage === 'home' ? (
              <>
                <Hero />
                <Features />
              </>
            ) : currentPage === 'about' ? (
              <About />
            ) : (
              <Contact />
            )}
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
